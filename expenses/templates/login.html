<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Expenses – Sign in</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0; gap: 1.5rem;
  }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0; }
</style>
</head>
<body>
  <h1>Expenses portal</h1>
  <div id="g_id_onload"
       data-client_id="{{ google_client_id }}"
       data-login_uri="{{ url_for('auth_google', _external=True) }}"
       data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-size="large"></div>
  <script src="https://accounts.google.com/gsi/client" async></script>
  {% if dev_login %}
  <p><a href="{{ url_for('dev_login') }}">Dev login</a></p>
  {% endif %}
</body>
</html>
